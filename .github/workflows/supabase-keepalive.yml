name: Supabase Keepalive

on:
  schedule:
    - cron: '0 7 */5 * *'   # ogni 5 giorni alle 07:00 UTC
  workflow_dispatch:          # eseguibile anche a mano

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (previene auto-pause)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/impostazioni?chiave=eq.NOME_REPARTO&select=valore")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERRORE: Supabase ha risposto con status $STATUS"
            exit 1
          fi
          echo "Keepalive OK — database attivo."
